[build]
  command = "cd frontend && npm install && npm run build"
  functions = "backend"
  publish = "frontend/dist"

[dev]
  command = "cd frontend && npm run dev"
  port = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/app/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
